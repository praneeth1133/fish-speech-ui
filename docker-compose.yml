version: '3.8'

services:
  ui:
    image: fish-speech-ui:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8080
      - FISH_SPEECH_API_URL=http://host.docker.internal:8080
    networks:
      - fish-speech-network
    restart: unless-stopped

networks:
  fish-speech-network:
    driver: bridge
